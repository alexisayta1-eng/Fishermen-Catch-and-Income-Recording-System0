<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FISHERMEN CATCH AND INCOME RECORDING SYSTEM FOR EDGAR DIALEL FISHING</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="login-bg">
    <header>
        <h1>FISHERMEN CATCH AND INCOME RECORDING SYSTEM FOR EDGAR DIALEL FISHING</h1>
    </header>

    <div class="container">
        <div class="auth-card fade-in" id="loginCard">
            <h2>System Login</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="password" placeholder="Enter password" required>
                        <button type="button" class="password-toggle"
                            onclick="togglePasswordVisibility('password', this)" title="Toggle Password">
                            <svg class="eye-open" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn">Login</button>
            </form>
            <div id="loginError" style="color: red; text-align: center; margin-top: 15px; display: none;">
                Invalid username or password.
            </div>
            <div style="text-align: center; margin-top: 20px; display: flex; flex-direction: column; gap: 10px;">
                <a href="#" onclick="toggleAuth('register')" style="color: var(--primary-blue); font-size: 0.9rem;">New
                    Fishermen? Sign Up Here</a>

            </div>
        </div>

        <div class="auth-card fade-in" id="registerCard" style="display: none;">
            <h2>Fishermen Sign Up</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label for="regUsername">Username</label>
                    <input type="text" id="regUsername" placeholder="Choose a username" required>
                </div>
                <div class="form-group">
                    <label for="regPassword">Password</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="regPassword" placeholder="Create a password" required>
                        <button type="button" class="password-toggle"
                            onclick="togglePasswordVisibility('regPassword', this)" title="Toggle Password">
                            <svg class="eye-open" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="regConfirm">Confirm Password</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="regConfirm" placeholder="Repeat password" required>
                        <button type="button" class="password-toggle"
                            onclick="togglePasswordVisibility('regConfirm', this)" title="Toggle Password">
                            <svg class="eye-open" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn">Register</button>
            </form>
            <div id="regError" style="color: red; text-align: center; margin-top: 15px; display: none;"></div>
            <div style="text-align: center; margin-top: 20px;">
                <a href="#" onclick="toggleAuth('login')" style="color: var(--primary-blue); font-size: 0.9rem;">Already
                    have an account? Login</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
    <script>
        function togglePasswordVisibility(id, btn) {
            const input = document.getElementById(id);
            const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
            input.setAttribute('type', type);

            // Toggle icon (Eye vs Eye-Slash) - minimal SVG change
            if (type === 'text') {
                btn.innerHTML = `
                    <svg class="eye-slash" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" />
                    </svg>
                `;
            } else {
                btn.innerHTML = `
                    <svg class="eye-open" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                    </svg>
                `;
            }
        }

        function toggleAuth(type) {
            const loginCard = document.getElementById('loginCard');
            const registerCard = document.getElementById('registerCard');
            if (type === 'register') {
                loginCard.style.display = 'none';
                registerCard.style.display = 'block';
            } else {
                loginCard.style.display = 'block';
                registerCard.style.display = 'none';
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            if (await App.login(user, pass)) {
                // Success - App.login handles redirection
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const user = document.getElementById('regUsername').value;
            const pass = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirm').value;
            const errorDiv = document.getElementById('regError');

            if (pass !== confirm) {
                errorDiv.innerText = "Passwords do not match.";
                errorDiv.style.display = 'block';
                return;
            }

            const result = await App.register(user, pass);
            if (result.success) {
                alert('Registration successful! Please login.');
                toggleAuth('login');
            } else {
                errorDiv.innerText = result.message;
                errorDiv.style.display = 'block';
            }
        });

        // Redirect if already logged in
        if (App.currentUser) {
            App.redirectBasedOnRole(App.currentUser.role);
        }
    </script>
</body>

</html>
